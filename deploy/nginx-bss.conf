# ============================================================================
# nginx-bss.conf — expõe o BSS em https://bss.nexussistemas.com.br
#
# ATENÇÃO: este arquivo é PARCIALMENTE GERENCIADO PELO CERTBOT.
# As linhas marcadas "# managed by Certbot" foram escritas por ele em
# 17/07/2026 e são reescritas a cada renovação. Este arquivo do git é uma
# CÓPIA FIEL do que está em /etc/nginx/conf.d/bss.conf na OCI — se você editar
# aqui, reaplique lá; se o certbot mexer lá, traga a mudança pra cá.
#
# Por que essa disciplina: já perdemos uma noite por causa de diferença
# silenciosa entre o git e o banco (empresa.cnpj NOT NULL). Config que existe
# só no servidor é a mesma armadilha, com outro nome.
#
# Instalar / atualizar (na OCI):
#     sudo cp /home/opc/bss-portal/deploy/nginx-bss.conf /etc/nginx/conf.d/bss.conf
#     sudo nginx -t          # SEMPRE testar antes de recarregar
#     sudo systemctl reload nginx
#
# Conferir se o servidor divergiu deste arquivo:
#     ssh opc@140.238.178.43 "cat /etc/nginx/conf.d/bss.conf"
#
# TLS: já emitido (expira 14/10/2026). Renovação automática via
# certbot-renew.timer — ver deploy/certbot-renew.service.
#
# ----------------------------------------------------------------------------
# CUIDADO — esta máquina não é só do BSS
# ----------------------------------------------------------------------------
# Ela também serve o METABASE em https://bi.nexuserp.com.br (nginx :34571 →
# localhost:3000) e roda um cron do OCSP às 06:00. Não mexer nesses blocos.
# ============================================================================

server {
    # bss.nexussistemas.com.br é o nome oficial. O registro já existia
    # apontando pra 13.58.121.19 (AWS): era o sandbox do sistema quente antes
    # de ele migrar pro domínio do cliente. Slot morto, reaproveitado aqui.
    # O bss.nexuserp fica como rede de segurança — NÃO tem certificado nem
    # DNS, então na prática nunca chega requisição por ele.
    server_name bss.nexussistemas.com.br bss.nexuserp.com.br;

    # Uploads de documento (o portal legado aceita até 24M por arquivo)
    client_max_body_size 25M;

    # Logs separados: não misturar com o Metabase
    access_log /var/log/nginx/bss-access.log;
    error_log  /var/log/nginx/bss-error.log;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # X-Forwarded-For é o que faz o autocadastro gravar o IP REAL de quem
        # aceitou o termo, e não 127.0.0.1. O aceite fala em responsabilidade
        # civil e criminal — o IP importa (ver bss.aceite_termo).
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Sync e relatórios podem demorar; o default de 60s é curto
        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/bss.nexussistemas.com.br/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/bss.nexussistemas.com.br/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# ----------------------------------------------------------------------------
# Porta 80 — só existe pra empurrar todo mundo pro HTTPS
# ----------------------------------------------------------------------------
# Bloco inteiro escrito pelo certbot. O `return 404` no fim pega quem chegar
# por um nome sem redirect (hoje: bss.nexuserp.com.br, que nem resolve).
server {
    if ($host = bss.nexussistemas.com.br) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen      80;
    listen      [::]:80;
    server_name bss.nexussistemas.com.br bss.nexuserp.com.br;
    return 404; # managed by Certbot
}
