# ============================================================================
# nginx-bss.conf — expõe o BSS pela porta 80/443
#
# Instalar (na OCI):
#     sudo cp /home/opc/bss-portal/deploy/nginx-bss.conf /etc/nginx/conf.d/bss.conf
#     sudo nginx -t          # SEMPRE testar antes de recarregar
#     sudo systemctl reload nginx
#
# TLS (depois que o DNS apontar pra 140.238.178.43):
#     sudo certbot --nginx -d bss.nexuserp.com.br
#   O certbot reescreve este arquivo adicionando o bloco 443. Já foi usado
#   nesta máquina pro bi.nexuserp.com.br, então está instalado e funciona.
#
# ----------------------------------------------------------------------------
# CUIDADO — esta máquina não é só do BSS
# ----------------------------------------------------------------------------
# Ela também serve o METABASE em https://bi.nexuserp.com.br (nginx :34571 →
# localhost:3000) e roda um cron do OCSP às 06:00. Não mexer nesses blocos.
# Este arquivo é NOVO e independente: só acrescenta, não altera o que existe.
#
# O bloco default do nginx (:80, server_name _, root /usr/share/nginx/html)
# continua respondendo por IP. Enquanto não houver DNS, use o server_name _
# comentado no fim deste arquivo pra atender pelo IP.
# ============================================================================

server {
    listen      80;
    listen      [::]:80;
    server_name bss.nexuserp.com.br;   # ajustar quando o DNS for decidido

    # Uploads de documento (o portal legado aceita até 24M por arquivo)
    client_max_body_size 25M;

    # Logs separados: não misturar com o Metabase
    access_log /var/log/nginx/bss-access.log;
    error_log  /var/log/nginx/bss-error.log;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # X-Forwarded-For é o que faz o autocadastro gravar o IP REAL de quem
        # aceitou o termo, e não 127.0.0.1. O aceite fala em responsabilidade
        # civil e criminal — o IP importa (ver bss.aceite_termo).
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Sync e relatórios podem demorar; o default de 60s é curto
        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
    }
}

# ----------------------------------------------------------------------------
# ACESSO POR IP — enquanto não houver DNS
# ----------------------------------------------------------------------------
# Descomente o bloco abaixo E comente o `listen 80 default_server` do
# /etc/nginx/nginx.conf, senão os dois brigam pelo default.
# Depois que o DNS existir, remova este bloco.
#
