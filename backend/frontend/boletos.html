<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Boletos — BSS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <div class="flex min-h-screen">
    <aside id="sidebar" class="w-56 flex-shrink-0"></aside>

    <div class="flex-1 flex flex-col">
      <header class="bg-white border-b border-slate-200">
        <div class="px-6 py-4 flex items-center justify-between">
          <h1 class="text-xl font-semibold text-slate-800">Boletos</h1>
          <div class="flex items-center gap-3 text-sm">
            <button id="btn-gerar"
                    onclick="abrirModalEmissao()"
                    class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium shadow-sm">
              ⬆ Gerar Boletos por CNPJ
            </button>
            <span id="usuario-info" class="text-slate-500">—</span>
            <button onclick="logout()" class="text-slate-500 hover:text-slate-800">Sair</button>
          </div>
        </div>
      </header>

      <main class="flex-1 px-6 py-6 max-w-7xl">
        <section class="bg-white rounded-lg border border-slate-200 p-4 mb-4">
          <div class="grid grid-cols-1 md:grid-cols-12 gap-3 items-end">
            <div class="md:col-span-4">
              <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Buscar (empresa / CNPJ / nosso número)</label>
              <input id="f-busca" type="text" class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-lg" oninput="agendarBusca()">
            </div>
            <div class="md:col-span-2">
              <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Status</label>
              <select id="f-status" class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-lg" onchange="recarregar()">
                <option value="">Todos (vivos)</option>
                <option value="gerado">Aberto</option>
                <option value="vencido">Vencido</option>
                <option value="pago">Pago</option>
                <option value="pendente">Pendente</option>
                <option value="cancelado">Cancelado</option>
              </select>
            </div>
            <div class="md:col-span-3">
              <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Mês de referência</label>
              <input id="f-mes" type="month" class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-lg" onchange="recarregar()">
            </div>
            <div id="wrap-cancelados" class="md:col-span-2 hidden">
              <label class="inline-flex items-center text-xs text-slate-600">
                <input id="f-cancelados" type="checkbox" class="mr-2" onchange="recarregar()">
                Exibir cancelados
              </label>
            </div>
            <div class="md:col-span-1">
              <button onclick="limparFiltros()" class="px-4 py-2 text-sm bg-slate-100 hover:bg-slate-200 rounded-lg">Limpar</button>
            </div>
          </div>
        </section>

        <div class="flex items-center justify-between mb-3 text-sm text-slate-600">
          <div id="stats">—</div>
          <div id="tempo" class="font-mono text-xs text-emerald-700"></div>
        </div>

        <section class="bg-white rounded-lg border border-slate-200 overflow-hidden">
          <div class="overflow-x-auto">
            <table class="min-w-full text-sm">
              <thead class="bg-slate-50 text-xs text-slate-600 uppercase tracking-wider">
                <tr>
                  <th class="px-3 py-2 text-left">Nº</th>
                  <th class="px-3 py-2 text-left">Empresa</th>
                  <th class="px-3 py-2 text-left">Sindicato</th>
                  <th class="px-3 py-2 text-center">Mês ref.</th>
                  <th class="px-3 py-2 text-right">Trab.</th>
                  <th class="px-3 py-2 text-right">Valor</th>
                  <th class="px-3 py-2 text-center">Status</th>
                  <th class="px-3 py-2 text-right">Vencimento</th>
                  <th class="px-3 py-2 text-center">Boleto</th>
                  <th class="px-3 py-2 text-center">Lista</th>
                </tr>
              </thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
          <div id="paginacao" class="flex items-center justify-between p-3 border-t border-slate-200 text-sm"></div>
        </section>
      </main>
    </div>
  </div>

  <!-- ==================== MODAL: Geração de Boletos ==================== -->
  <div id="modal-emissao" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-40 p-4">
    <div class="bg-white rounded-lg shadow-xl max-w-5xl w-full max-h-[90vh] overflow-hidden flex flex-col">
      <div class="px-5 py-3 border-b border-slate-200 flex items-center justify-between">
        <h2 class="text-lg font-semibold text-slate-800">Gerar Boletos por CNPJ</h2>
        <button onclick="fecharModalEmissao()" class="text-slate-400 hover:text-slate-700 text-xl">×</button>
      </div>

      <div id="modal-corpo" class="overflow-auto p-5 flex-1">
        <div id="modal-loading" class="text-center text-slate-500 py-12">Carregando…</div>
        <div id="modal-conteudo" class="hidden"></div>
      </div>

      <div class="px-5 py-3 border-t border-slate-200 bg-slate-50 flex items-center justify-between">
        <div id="modal-rodape-info" class="text-sm text-slate-600"></div>
        <div class="flex gap-2">
          <button id="btn-cancelar" onclick="fecharModalEmissao()" class="px-4 py-2 text-sm bg-slate-200 hover:bg-slate-300 rounded-lg">Fechar</button>
          <button id="btn-confirmar" onclick="confirmarEmissao()" class="px-4 py-2 text-sm bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg hidden">Gerar Boleto</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/app/js/api.js"></script>
  <script src="/app/js/sidebar.js"></script>
  <script>renderizarSidebar("boletos");</script>
  <script src="/app/js/boletos.js"></script>
</body>
</html>
