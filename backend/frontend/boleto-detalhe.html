<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Detalhe do Boleto — BSS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <div class="flex min-h-screen">
    <aside id="sidebar" class="w-56 flex-shrink-0"></aside>

    <div class="flex-1 flex flex-col">
      <header class="bg-white border-b border-slate-200">
        <div class="px-6 py-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <a href="/app/boletos.html" class="text-slate-400 hover:text-slate-700 text-xl">←</a>
            <h1 id="titulo" class="text-xl font-semibold text-slate-800">Detalhe do Boleto</h1>
          </div>
          <div class="flex items-center gap-3 text-sm">
            <span id="usuario-info" class="text-slate-500">—</span>
            <button onclick="logout()" class="text-slate-500 hover:text-slate-800">Sair</button>
          </div>
        </div>
      </header>

      <main class="flex-1 px-6 py-6 max-w-7xl">
        <div id="loading" class="text-slate-500 text-center py-12">Carregando…</div>

        <div id="conteudo" class="hidden space-y-4">
          <!-- Aba única (legado tem só "Básica" pra boleto) + ações à direita -->
          <div class="flex items-center gap-2 border-b border-slate-200">
            <button class="px-4 py-2 text-sm font-medium text-slate-800 border-b-2 border-indigo-600">Básica</button>
            <div class="ml-auto flex gap-2 py-2">
              <button id="btn-pdf"   onclick="abrirPdf()"  class="px-3 py-1 text-sm bg-blue-600  hover:bg-blue-700  text-white rounded hidden">PDF Boleto</button>
              <button id="btn-lista" onclick="abrirLista()" class="px-3 py-1 text-sm bg-slate-600 hover:bg-slate-700 text-white rounded hidden">PDF Lista</button>
              <button id="btn-reemitir" onclick="reemitir()" class="px-3 py-1 text-sm bg-amber-600 hover:bg-amber-700 text-white rounded hidden">Reemitir</button>
              <button id="btn-cancelar" onclick="cancelar()" class="px-3 py-1 text-sm bg-rose-600 hover:bg-rose-700 text-white rounded hidden">Cancelar</button>
            </div>
          </div>

          <!-- Informações básicas: 2 colunas -->
          <section class="bg-white rounded-lg border border-slate-200 p-5">
            <div id="grid-info" class="grid grid-cols-1 md:grid-cols-12 gap-y-3 gap-x-6 text-sm"></div>
          </section>

          <!-- Log -->
          <section class="bg-white rounded-lg border border-slate-200">
            <div class="px-5 py-3 bg-slate-50 border-b border-slate-200">
              <h2 class="text-sm font-semibold text-slate-700">LOG</h2>
            </div>
            <div id="grid-log" class="p-5 grid grid-cols-1 md:grid-cols-12 gap-y-3 gap-x-6 text-sm"></div>
          </section>

          <!-- Trabalhadores vinculados (sanfona fechada por padrão) -->
          <section class="bg-white rounded-lg border border-slate-200 overflow-hidden">
            <details>
              <summary class="px-5 py-3 bg-slate-50 border-b border-slate-200 flex items-center justify-between cursor-pointer hover:bg-slate-100 select-none">
                <h2 class="text-sm font-semibold text-slate-700">TRABALHADORES / DEPENDENTES</h2>
                <span id="qtd-itens" class="text-xs text-slate-500">—</span>
              </summary>
              <div class="overflow-x-auto">
                <table class="min-w-full text-sm">
                  <thead class="bg-slate-50 text-xs text-slate-600 uppercase tracking-wider">
                    <tr>
                      <th class="px-3 py-2 text-left">Nome</th>
                      <th class="px-3 py-2 text-left">CPF</th>
                      <th class="px-3 py-2 text-center">Tipo</th>
                      <th class="px-3 py-2 text-center">Situação</th>
                      <th class="px-3 py-2 text-right">Taxa aplicada</th>
                      <th class="px-3 py-2 text-center">Admissão</th>
                    </tr>
                  </thead>
                  <tbody id="tbody-itens"></tbody>
                </table>
              </div>
            </details>
          </section>
        </div>

        <div id="erro" class="hidden text-rose-600 text-center py-8"></div>
      </main>
    </div>
  </div>

  <script src="/app/js/api.js"></script>
  <script src="/app/js/sidebar.js"></script>
  <script>renderizarSidebar("boletos");</script>
  <script src="/app/js/boleto-detalhe.js"></script>
</body>
</html>
