<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Contas a Pagar — BSS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <div class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="w-60 flex-shrink-0"></aside>

    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="bg-white border-b border-slate-200 flex-shrink-0">
        <div class="px-6 py-4 flex items-center justify-between">
          <div>
            <h1 class="text-xl font-semibold text-slate-800">Contas a Pagar</h1>
            <p id="subtitulo" class="text-xs text-slate-500 mt-0.5">carregando…</p>
          </div>
          <div class="flex items-center gap-3 text-sm">
            <span id="usuario-info" class="text-slate-500">—</span>
            <button onclick="logout()" class="text-slate-500 hover:text-slate-800">Sair</button>
          </div>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto p-6">
        <!-- Filtros -->
        <section class="bg-white rounded-lg border border-slate-200 p-4 mb-4">
          <div class="grid grid-cols-1 md:grid-cols-12 gap-3 items-end">
            <div class="md:col-span-3">
              <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Buscar</label>
              <input id="f-busca" type="text" placeholder="Protocolo, empresa, CPF, beneficiário…"
                     oninput="agendarBusca()"
                     class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
            </div>
            <div class="md:col-span-2">
              <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Status</label>
              <select id="f-status" onchange="recarregar()"
                      class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
                <option value="">Todos</option>
                <option value="pendente" selected>Pendente</option>
                <option value="pago">Pago</option>
                <option value="cancelado">Cancelado</option>
              </select>
            </div>
            <div class="md:col-span-2">
              <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Forma</label>
              <select id="f-forma" onchange="recarregar()"
                      class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
                <option value="">Todas</option>
                <option value="pix">PIX</option>
                <option value="cartao">Cartão</option>
              </select>
            </div>
            <div class="md:col-span-2">
              <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Prevista de</label>
              <input id="f-data-de" type="date" onchange="recarregar()"
                     class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
            </div>
            <div class="md:col-span-2">
              <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Prevista até</label>
              <input id="f-data-ate" type="date" onchange="recarregar()"
                     class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
            </div>
            <div class="md:col-span-1">
              <button onclick="limpar()"
                      class="mt-1 w-full px-3 py-2 text-sm bg-slate-100 hover:bg-slate-200 rounded-lg">Limpar</button>
            </div>
          </div>
        </section>

        <!-- Barra de ação + totais -->
        <div class="flex items-center justify-between mb-3 gap-3 flex-wrap">
          <div class="text-sm text-slate-600">
            <span id="stats">—</span>
            <span id="soma" class="ml-3 font-semibold text-slate-800"></span>
            <span id="tempo" class="ml-2 text-xs text-slate-400"></span>
          </div>
          <div class="flex items-center gap-2">
            <button id="btn-liquidar" onclick="liquidarSelecionados()" disabled
                    class="px-4 py-2 text-sm bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg
                           font-medium disabled:opacity-40 disabled:cursor-not-allowed">
              Liquidar selecionados (<span id="sel-count">0</span>)
            </button>
            <button onclick="exportar()"
                    class="px-4 py-2 text-sm border border-slate-300 text-slate-700 rounded-lg hover:bg-white">
              ⬇ Exportar Excel
            </button>
          </div>
        </div>

        <!-- Tabela -->
        <div class="bg-white rounded-lg border border-slate-200 overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-slate-50 text-slate-500">
              <tr>
                <th class="px-3 py-2 text-center w-8">
                  <input type="checkbox" id="chk-todos" onchange="marcarTodos(this.checked)">
                </th>
                <th class="px-3 py-2 text-left">Protocolo</th>
                <th class="px-3 py-2 text-center">Parc.</th>
                <th class="px-3 py-2 text-left">Beneficiário</th>
                <th class="px-3 py-2 text-left">Empresa</th>
                <th class="px-3 py-2 text-left">Tipo</th>
                <th class="px-3 py-2 text-right">Valor</th>
                <th class="px-3 py-2 text-center">Prevista</th>
                <th class="px-3 py-2 text-center">Forma</th>
                <th class="px-3 py-2 text-center">Status</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div id="paginacao" class="mt-3"></div>
      </main>
    </div>
  </div>

  <script src="/app/js/api.js"></script>
  <script src="/app/js/sidebar.js"></script>
  <script>renderizarSidebar("contas-pagar");</script>
  <script src="/app/js/contas-pagar.js"></script>
</body>
</html>
