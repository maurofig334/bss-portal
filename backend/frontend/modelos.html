<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Modelos de E-mail — BSS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <div class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="w-60 flex-shrink-0"></aside>

    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="bg-white border-b border-slate-200 flex-shrink-0">
        <div class="px-6 py-4 flex items-center justify-between">
          <div>
            <h1 class="text-xl font-semibold text-slate-800">Modelos de E-mail</h1>
            <p class="text-xs text-slate-500 mt-0.5">
              Textos dos avisos em massa. Use as variáveis para personalizar por empresa/contato.
            </p>
          </div>
          <div class="flex items-center gap-3 text-sm">
            <span id="usuario-info" class="text-slate-500">—</span>
            <button onclick="logout()" class="text-slate-500 hover:text-slate-800">Sair</button>
          </div>
        </div>
      </header>

      <div class="flex-1 flex overflow-hidden">
        <!-- Lista de modelos -->
        <div class="w-72 flex-shrink-0 border-r border-slate-200 bg-white overflow-y-auto">
          <div id="lista-modelos" class="divide-y divide-slate-100">
            <div class="p-4 text-sm text-slate-400">Carregando…</div>
          </div>
        </div>

        <!-- Editor + preview -->
        <div class="flex-1 overflow-y-auto">
          <div id="editor-vazio" class="h-full flex items-center justify-center text-slate-400 text-sm">
            Selecione um modelo à esquerda para editar.
          </div>

          <div id="editor" class="hidden p-6 max-w-5xl">
            <div class="flex items-center justify-between gap-4 mb-4 flex-wrap">
              <div>
                <h2 id="ed-nome" class="text-lg font-semibold text-slate-800"></h2>
                <div class="text-xs text-slate-500 mt-0.5">
                  <span id="ed-destinatario" class="px-2 py-0.5 rounded-full bg-slate-100"></span>
                  <span id="ed-codigo" class="ml-2 font-mono text-slate-400"></span>
                </div>
              </div>
              <label class="inline-flex items-center text-sm text-slate-700">
                <input type="checkbox" id="ed-ativo" class="mr-2">
                Ativo (pode ser disparado)
              </label>
            </div>

            <!-- Paleta de variáveis -->
            <div class="mb-4 bg-indigo-50/50 border border-indigo-100 rounded-lg p-3">
              <div class="text-xs font-semibold text-indigo-900 uppercase tracking-wider mb-2">
                Variáveis disponíveis — clique para inserir no corpo
              </div>
              <div id="paleta" class="flex flex-wrap gap-1.5"></div>
            </div>

            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Assunto</label>
            <input id="ed-assunto" type="text"
                   class="w-full text-sm border border-slate-300 rounded-lg px-3 py-2 mb-4
                          focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">

            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Corpo</label>
            <textarea id="ed-corpo" rows="16"
                      class="w-full text-sm font-mono border border-slate-300 rounded-lg px-3 py-2
                             focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"></textarea>

            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 mt-4">Observação interna</label>
            <input id="ed-obs" type="text" placeholder="Nota para a equipe (não vai no e-mail)"
                   class="w-full text-sm border border-slate-300 rounded-lg px-3 py-2
                          focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">

            <div class="flex items-center gap-3 mt-4">
              <button onclick="salvar()" id="btn-salvar"
                      class="px-4 py-2 text-sm bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium">
                Salvar
              </button>
              <button onclick="abrirPreview()"
                      class="px-4 py-2 text-sm border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50">
                Pré-visualizar com dados reais
              </button>
              <span id="ed-status" class="text-xs"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal de preview -->
  <div id="modal-preview" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl max-w-2xl w-full max-h-[85vh] flex flex-col">
      <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between gap-3">
        <h3 class="font-semibold text-slate-800">Pré-visualização</h3>
        <button onclick="document.getElementById('modal-preview').classList.add('hidden')"
                class="text-slate-400 hover:text-slate-700 text-xl leading-none">&times;</button>
      </div>
      <div class="px-5 py-3 border-b border-slate-100 bg-slate-50">
        <label class="block text-xs text-slate-500 mb-1" id="lbl-alvo">Resolver contra:</label>
        <input id="preview-busca" type="text"
               placeholder="Buscar por nome, e-mail ou CNPJ…"
               class="w-full text-sm border border-slate-300 rounded-lg px-2 py-1.5 bg-white mb-2
                      focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
        <select id="preview-alvo" onchange="carregarPreview()" size="6"
                class="w-full text-sm border border-slate-300 rounded-lg px-2 py-1.5 bg-white">
        </select>
      </div>
      <div id="preview-conteudo" class="px-5 py-4 overflow-y-auto flex-1">
        <div class="text-sm text-slate-400">Carregando…</div>
      </div>
    </div>
  </div>

  <script src="/app/js/api.js"></script>
  <script src="/app/js/sidebar.js"></script>
  <script>renderizarSidebar("modelos");</script>
  <script src="/app/js/modelos.js"></script>
</body>
</html>
