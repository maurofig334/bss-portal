<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard — BSS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="bg-slate-50">

  <div class="flex min-h-screen">
    <aside id="sidebar" class="w-56 flex-shrink-0"></aside>

    <div class="flex-1 flex flex-col">
      <header class="bg-white border-b border-slate-200">
        <div class="px-6 py-4 flex items-center justify-between">
          <h1 class="text-xl font-semibold text-slate-800">Dashboard</h1>
          <div class="flex items-center gap-3 text-sm">
            <span id="usuario-info" class="text-slate-500">—</span>
            <button onclick="logout()" class="text-slate-500 hover:text-slate-800">Sair</button>
          </div>
        </div>
      </header>

      <main class="flex-1 px-6 py-6">

        <!-- KPIs (cards) -->
        <section class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6" id="kpis">
          <div class="bg-white rounded-lg border border-slate-200 p-4 animate-pulse h-24"></div>
          <div class="bg-white rounded-lg border border-slate-200 p-4 animate-pulse h-24"></div>
          <div class="bg-white rounded-lg border border-slate-200 p-4 animate-pulse h-24"></div>
          <div class="bg-white rounded-lg border border-slate-200 p-4 animate-pulse h-24"></div>
          <div class="bg-white rounded-lg border border-slate-200 p-4 animate-pulse h-24"></div>
        </section>

        <!-- Gráficos -->
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div class="bg-white rounded-lg border border-slate-200 p-4">
            <h3 class="text-sm font-semibold text-slate-700 mb-3">Boletos por mês (últimos 12 meses)</h3>
            <div class="relative h-64"><canvas id="grafico-boletos"></canvas></div>
          </div>

          <div class="bg-white rounded-lg border border-slate-200 p-4">
            <h3 class="text-sm font-semibold text-slate-700 mb-3">Processos por status</h3>
            <div class="relative h-64"><canvas id="grafico-status"></canvas></div>
          </div>

          <div class="bg-white rounded-lg border border-slate-200 p-4 lg:col-span-2">
            <h3 class="text-sm font-semibold text-slate-700 mb-3">Distribuição por tipo de benefício</h3>
            <div class="relative h-64"><canvas id="grafico-tipos"></canvas></div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="/app/js/api.js"></script>
  <script src="/app/js/sidebar.js"></script>
  <script>renderizarSidebar("dashboard");</script>
  <script src="/app/js/dashboard.js"></script>
</body>
</html>
