<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Trabalhadores — BSS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">

  <div class="flex min-h-screen">
    <aside id="sidebar" class="w-56 flex-shrink-0"></aside>

    <div class="flex-1 flex flex-col">
      <header class="bg-white border-b border-slate-200">
        <div class="px-6 py-4 flex items-center justify-between gap-4">
          <!-- Seletor de empresa: só aparece pro perfil 'empresa' com mais de
               um CNPJ vinculado. Ver js/empresa-atual.js. -->
          <div id="seletor-empresa"></div>
          <div class="flex items-center gap-3 text-sm">
            <span id="usuario-info" class="text-slate-500">—</span>
            <button onclick="logout()" class="text-slate-500 hover:text-slate-800">Sair</button>
          </div>
        </div>
      </header>

      <main class="flex-1 px-6 py-6 max-w-7xl">

        <!-- Cabeçalho da listagem + toolbar (padrão OCSP) -->
        <div class="flex items-start justify-between gap-4 mb-4 flex-wrap">
          <div>
            <h1 class="text-2xl font-bold text-slate-800">Trabalhadores</h1>
            <p id="subtitulo" class="text-sm text-slate-500 mt-0.5">carregando…</p>
          </div>

          <div class="flex items-center gap-2 flex-wrap justify-end">
            <!-- Ações de upload -->
            <button onclick="abrirModalUpload('carregar')" class="px-2.5 py-1.5 text-xs bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium">⬆ Carregar</button>
            <button onclick="abrirModalUpload('inativar')" class="px-2.5 py-1.5 text-xs bg-amber-600 text-white rounded-lg hover:bg-amber-700 font-medium">❌ Inativar</button>
            <button onclick="abrirModalUpload('dependentes')" class="px-2.5 py-1.5 text-xs bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 font-medium">👥 Dependentes</button>

            <span class="w-px h-6 bg-slate-200 mx-1"></span>

            <!-- Controles do grid -->
            <div class="relative">
              <input id="f-busca" type="text" placeholder="Buscar…"
                     class="w-48 pl-8 pr-3 py-1.5 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                     oninput="agendarBusca()">
              <span class="absolute left-2.5 top-1.5 text-slate-400 text-sm">⌕</span>
            </div>
            <button onclick="abrirFiltro()" id="btn-filtro"
                    class="px-3 py-1.5 text-sm border border-slate-300 rounded-lg hover:bg-slate-100 flex items-center gap-1">⛃ Filtro <span id="filtro-badge" class="hidden ml-1 px-1.5 py-0.5 bg-indigo-100 text-indigo-700 rounded-full text-[10px]"></span></button>
            <button onclick="abrirMeusFiltros(event)" class="px-3 py-1.5 text-sm border border-slate-300 rounded-lg hover:bg-slate-100">Meus filtros</button>
            <button onclick="abrirColunas()" class="px-3 py-1.5 text-sm border border-slate-300 rounded-lg hover:bg-slate-100">▦ Colunas</button>
            <select id="f-preset" onchange="recarregar()" class="px-2 py-1.5 text-sm border border-slate-300 rounded-lg bg-white">
              <option value="ativo">Ativos</option>
              <option value="inativo">Inativos</option>
              <option value="">Todos</option>
            </select>
          </div>
        </div>

        <div class="flex items-center justify-end mb-2">
          <div id="tempo" class="font-mono text-xs text-emerald-700"></div>
        </div>

        <section class="bg-white rounded-lg border border-slate-200 overflow-hidden">
          <div class="overflow-x-auto">
            <table class="min-w-full text-sm">
              <thead class="bg-slate-50 text-xs text-slate-500 uppercase tracking-wider">
                <tr id="thead-row"></tr>
              </thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
          <div id="paginacao" class="flex items-center justify-between p-3 border-t border-slate-200 text-sm"></div>
        </section>
      </main>
    </div>
  </div>

  <script src="/app/js/api.js"></script>
  <script src="/app/js/empresa-atual.js"></script>
  <script src="/app/js/sidebar.js"></script>
  <script>renderizarSidebar("trabalhadores");</script>
  <div id="dep-tooltip"
       class="hidden fixed z-50 max-w-xs bg-white border border-slate-300 rounded-lg shadow-lg p-3 pointer-events-none">
    <div class="tt-conteudo"></div>
  </div>

  <div id="modal-upload" class="hidden fixed inset-0 z-40 bg-slate-900/50 flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-hidden flex flex-col">
      <div class="px-5 py-3 border-b border-slate-200 flex items-center justify-between">
        <h2 id="modal-titulo" class="font-semibold text-slate-800">Carregar Trabalhadores</h2>
        <button onclick="fecharModalUpload()" class="text-slate-400 hover:text-slate-700 text-xl leading-none">&times;</button>
      </div>
      <div id="modal-corpo" class="px-5 py-4 overflow-y-auto flex-1">
        <p class="text-sm text-slate-600 mb-3">
          1. <a href="#" onclick="baixarTemplate(event)" class="text-indigo-700 hover:underline">Clique aqui para baixar a planilha modelo</a>
        </p>
        <div class="border border-slate-200 rounded-lg p-4 bg-slate-50">
          <label class="block text-sm font-medium text-slate-700 mb-2">
            <span class="text-rose-600">*</span> Arquivo (.xlsx)
          </label>
          <input id="f-arquivo" type="file" accept=".xlsx,.xlsm" class="block w-full text-sm">
        </div>
        <div id="modal-status" class="mt-3 text-sm"></div>
      </div>
      <div class="px-5 py-3 border-t border-slate-200 flex justify-end gap-2 bg-slate-50">
        <button onclick="fecharModalUpload()" class="px-4 py-1.5 bg-slate-200 hover:bg-slate-300 rounded text-sm">Fechar</button>
        <button id="btn-carregar" onclick="enviarUpload()" class="px-4 py-1.5 bg-indigo-600 text-white hover:bg-indigo-700 rounded text-sm font-medium">Carregar</button>
        <button id="btn-confirmar-inativacao" class="hidden px-4 py-1.5 bg-amber-600 text-white hover:bg-amber-700 rounded text-sm font-medium" onclick="confirmarInativacao()">Efetivar Inativação</button>
      </div>
    </div>
  </div>

  <script src="/app/js/grid-utils.js"></script>
  <script src="/app/js/trabalhadores.js"></script>
</body>
</html>
