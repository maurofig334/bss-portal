<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Detalhe da Empresa — BSS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <div class="flex min-h-screen">
    <aside id="sidebar" class="w-56 flex-shrink-0"></aside>

    <div class="flex-1 flex flex-col">
      <header class="bg-white border-b border-slate-200">
        <div class="px-6 py-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <a href="/app/empresas.html" class="text-slate-400 hover:text-slate-700 text-xl">←</a>
            <h1 id="titulo" class="text-xl font-semibold text-slate-800">Detalhe da Empresa</h1>
          </div>
          <div class="flex items-center gap-3 text-sm">
            <span id="usuario-info" class="text-slate-500">—</span>
            <button onclick="logout()" class="text-slate-500 hover:text-slate-800">Sair</button>
          </div>
        </div>
      </header>

      <main class="flex-1 px-6 py-6 max-w-7xl">
        <div id="loading" class="text-slate-500 text-center py-12">Carregando…</div>

        <div id="conteudo" class="hidden space-y-4">
          <!-- Cabeçalho da empresa -->
          <section class="bg-white rounded-lg border border-slate-200 p-5">
            <div id="grid-basica" class="grid grid-cols-1 md:grid-cols-12 gap-y-3 gap-x-6 text-sm"></div>
          </section>

          <!-- Relacionamentos (abas inferiores) -->
          <section class="bg-white rounded-lg border border-slate-200">
            <div class="border-b border-slate-200 flex items-center gap-1 px-3 overflow-x-auto">
              <button id="rtab-trabalhadores" onclick="trocarRel('trabalhadores')"
                      class="px-4 py-2.5 text-sm font-medium text-slate-800 border-b-2 border-indigo-600 whitespace-nowrap">
                Trabalhadores / Dependentes <span id="rcount-trabalhadores" class="ml-1 px-1.5 py-0.5 rounded-full text-[10px] bg-slate-100 text-slate-600">·</span>
              </button>
              <button id="rtab-boletos" onclick="trocarRel('boletos')"
                      class="px-4 py-2.5 text-sm text-slate-500 hover:text-slate-800 whitespace-nowrap">Boletos</button>
              <button id="rtab-usuarios" onclick="trocarRel('usuarios')"
                      class="px-4 py-2.5 text-sm text-slate-500 hover:text-slate-800 whitespace-nowrap">Usuários com acesso</button>
              <button id="rtab-historico" onclick="trocarRel('historico')"
                      class="px-4 py-2.5 text-sm text-slate-500 hover:text-slate-800 whitespace-nowrap">Histórico</button>
            </div>
            <div id="rel-trabalhadores" class="min-h-[120px]"></div>
            <div id="rel-boletos" class="hidden min-h-[120px]"></div>
            <div id="rel-usuarios" class="hidden min-h-[120px]"></div>
            <div id="rel-historico" class="hidden min-h-[120px]"></div>
          </section>
        </div>

        <div id="erro" class="hidden text-rose-600 text-center py-8"></div>
      </main>
    </div>
  </div>

  <script src="/app/js/api.js"></script>
  <script src="/app/js/sidebar.js"></script>
  <script>renderizarSidebar("empresas");</script>
  <script src="/app/js/empresa-detalhe.js"></script>
</body>
</html>
