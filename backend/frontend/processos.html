<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Benefícios — BSS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <div class="flex min-h-screen">
    <aside id="sidebar" class="w-56 flex-shrink-0"></aside>

    <div class="flex-1 flex flex-col">
      <header class="bg-white border-b border-slate-200">
        <div class="px-6 py-4 flex items-center justify-between">
          <h1 class="text-xl font-semibold text-slate-800">Benefícios</h1>
          <div class="flex items-center gap-3 text-sm">
            <span id="usuario-info" class="text-slate-500">—</span>
            <button onclick="logout()" class="text-slate-500 hover:text-slate-800">Sair</button>
          </div>
        </div>
      </header>

      <main class="flex-1 px-6 py-6">
        <section class="bg-white rounded-lg border border-slate-200 p-4 mb-4">
          <div class="grid grid-cols-1 md:grid-cols-12 gap-3 items-end">
            <div class="md:col-span-4">
              <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Buscar (CPF, nome, empresa, protocolo)</label>
              <input id="f-busca" type="text" class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-lg" oninput="agendarBusca()">
            </div>
            <div class="md:col-span-3">
              <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Status</label>
              <select id="f-status" class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-lg" onchange="recarregar()">
                <option value="">Todos</option>
              </select>
            </div>
            <div class="md:col-span-3">
              <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Tipo</label>
              <select id="f-tipo" class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-lg" onchange="recarregar()">
                <option value="">Todos</option>
                <option value="natalidade">Natalidade</option>
                <option value="falecimento">Falecimento</option>
                <option value="consulta_medica">Consulta Médica</option>
                <option value="acidente">Acidente</option>
                <option value="acionamento_funeral">Acionamento Funeral</option>
                <option value="exame">Exame</option>
                <option value="reembolso_rescisao">Reembolso Rescisão</option>
                <option value="incapacitacao">Incapacitação</option>
                <option value="brinde_sindicato">Brinde Sindicato</option>
                <option value="auxilio_creche">Auxílio Creche</option>
              </select>
            </div>
            <div class="md:col-span-2">
              <button onclick="limparFiltros()" class="px-4 py-2 text-sm bg-slate-100 hover:bg-slate-200 rounded-lg">Limpar</button>
            </div>
          </div>
          <div class="flex flex-wrap gap-2 mt-3" id="categoria-tabs"></div>
        </section>

        <div class="flex items-center justify-between mb-3 text-sm text-slate-600">
          <div id="stats">—</div>
          <div id="tempo" class="font-mono text-xs text-emerald-700"></div>
        </div>

        <section class="bg-white rounded-lg border border-slate-200 overflow-hidden">
          <div class="overflow-x-auto">
            <table class="min-w-full text-sm">
              <thead class="bg-slate-50 text-xs text-slate-600 uppercase tracking-wider">
                <tr>
                  <th class="px-3 py-2 text-left">Protocolo</th>
                  <th class="px-3 py-2 text-left">Trabalhador</th>
                  <th class="px-3 py-2 text-left">Tipo</th>
                  <th class="px-3 py-2 text-left">Empresa</th>
                  <th class="px-3 py-2 text-left">Sindicato</th>
                  <th class="px-3 py-2 text-center">Status</th>
                  <th class="px-3 py-2 text-right">Evento</th>
                  <th class="px-3 py-2 text-right">Finalização</th>
                </tr>
              </thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
          <div id="paginacao" class="flex items-center justify-between p-3 border-t border-slate-200 text-sm"></div>
        </section>
      </main>
    </div>
  </div>

  <script src="/app/js/api.js"></script>
  <script src="/app/js/sidebar.js"></script>
  <script>renderizarSidebar("processos");</script>
  <script src="/app/js/processos.js"></script>
</body>
</html>
